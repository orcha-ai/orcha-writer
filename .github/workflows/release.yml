name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-latest
            rust_targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - name: macOS Apple Silicon
            runner: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: Windows x64
            runner: windows-2022
            rust_targets: ''
            args: --bundles nsis
          - name: Linux x64
            runner: ubuntu-22.04
            rust_targets: ''
            args: --bundles appimage,deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseName: Orcha Writer ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v__VERSION__' }}
          releaseBody: |
            自动构建的 Orcha Writer 安装包。

            macOS 包当前未配置 Apple Developer ID 签名；Windows 包当前未配置代码签名。
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          uploadUpdaterJson: false
          retryAttempts: 2
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch]_[bundle][ext]'
          args: ${{ matrix.args }}
