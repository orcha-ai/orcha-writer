<svg xmlns="http://www.w3.org/2000/svg" width="1002" height="333" viewBox="0 0 1002 333" role="img" aria-labelledby="title desc">
  <title id="title">Orcha Writer</title>
  <desc id="desc">Orcha 写作，跨平台 Markdown 写作与文档管理工具</desc>
  <defs>
    <linearGradient id="docBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D93FF"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="curlBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8DEFF"/>
      <stop offset="100%" stop-color="#8CB9FF"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="128%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
